# Deploy collaborate.so to the droplet on every push to main.
#
# Required repository secrets:
#   DEPLOY_HOST   droplet IP or hostname
#   DEPLOY_USER   SSH user (e.g. root, or a deploy user)
#   DEPLOY_KEY    private SSH key with access to the droplet
#   DEPLOY_DIR    repo path on the droplet (e.g. /opt/collaborate)

name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deploys at once.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  deploy:
    needs: build-check
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -euo pipefail
            cd ${{ secrets.DEPLOY_DIR }}
            git fetch --quiet origin main
            git reset --hard origin/main
            docker compose -f deploy/docker-compose.yml up -d --build
            docker image prune -f >/dev/null
