# collaborate.so — the entire production stack for one droplet.
#   app    the Node server (bundled, single process)
#   nginx  TLS termination (Cloudflare origin cert) + reverse proxy
#
# Deploy:  docker compose -f deploy/docker-compose.yml up -d --build

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0          # reachable from the nginx container
      PORT: 3000
      TRUST_PROXY: "true"    # behind nginx + Cloudflare
    expose:
      - "3000"
    # Leave headroom on the 2GB droplet for nginx + the OS.
    mem_limit: 1500m
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
