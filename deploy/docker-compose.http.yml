# Interim deploy WITHOUT TLS — the app served directly on port 80.
#
# Use this until a Cloudflare Origin Certificate is in place. Once it is,
# switch to docker-compose.yml (which adds Nginx + TLS termination):
#
#   docker compose -f deploy/docker-compose.http.yml down
#   docker compose -f deploy/docker-compose.yml up -d --build
#
# Deploy / update:
#   docker compose -f deploy/docker-compose.http.yml up -d --build

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      # No proxy in front yet — use the real socket IP for rate limiting.
      TRUST_PROXY: "false"
    ports:
      - "80:3000"
    mem_limit: 1500m
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
