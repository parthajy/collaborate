# collaborate.so — Nginx reverse proxy.
#
# Cloudflare terminates the public TLS and re-encrypts to this origin with a
# Cloudflare Origin Certificate. Nginx terminates that and proxies both HTTP
# and WebSocket traffic to the Node app. The app serves the static site;
# Cloudflare caches it at the edge (see README → "Static assets").

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream collaborate_app {
    # docker-compose: the 'app' service. For the systemd setup instead,
    # change this to 127.0.0.1:3000.
    server app:3000;
    keepalive 32;
}

# Plain HTTP → HTTPS (Cloudflare should already enforce this).
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name collaborate.so www.collaborate.so;

    # Cloudflare Origin Certificate — see deploy/certs/README.md.
    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Matches the server's WebSocket maxPayload (5 MB).
    client_max_body_size 5m;

    location / {
        proxy_pass http://collaborate_app;
        proxy_http_version 1.1;

        # WebSocket upgrade.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Real client IP — the app's per-IP rate limiter depends on these.
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP         $remote_addr;

        # Long-lived WebSockets — do not time them out at the default 60s.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
